# docker-compose.yml
services:
  app:
    build: .
    container_name: kikidilivery-api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/kikidilivery
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password

  postgres:
    image: postgres:17
    container_name: kikidilivery-postgres
    environment:
      POSTGRES_DB: kikidilivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5455:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: kikidilivery-adminer
    ports:
      - "8081:8080"

volumes:
  postgres_data: